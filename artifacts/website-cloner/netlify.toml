# Configuration for Netlify deployment if Base directory is set to artifacts/website-cloner

[build]
  # Build command
  command = "npm run build"

  # Publish directory relative to base path
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
