openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Website Clone Prompt Generator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: prompt
    description: Clone prompt generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate-prompt:
    post:
      operationId: generatePrompt
      tags: [prompt]
      summary: Generate a clone prompt for a website URL
      description: Analyzes the given website URL and generates a detailed clone/copy prompt using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptInput"
      responses:
        "200":
          description: Successfully generated clone prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptResult"
        "400":
          description: Invalid URL or request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PromptInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: The website URL to analyze and generate a clone prompt for
    PromptResult:
      type: object
      required:
        - prompt
        - analyzedUrl
        - title
      properties:
        prompt:
          type: string
          description: The detailed clone prompt for recreating the website
        analyzedUrl:
          type: string
          description: The URL that was analyzed
        title:
          type: string
          description: The website title
        description:
          type: ["string", "null"]
          description: The website meta description
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
